<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
<defs>
  <linearGradient id="borderGrad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow-dark" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#0B1120"/>
    <stop offset="100%" stop-color="#050816"/>
  </radialGradient>
  <filter id="softGlow-dark" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <mask id="revealMask-dark" maskUnits="userSpaceOnUse" x="0" y="0" width="1180" height="610">
    <rect x="0" y="0" width="1180" height="0" fill="#fff">
      <animate attributeName="height" from="0" to="590" dur="2.4s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
  </mask>
  <clipPath id="lc-dark-0"><rect x="40" y="44" width="0" height="24"><animate attributeName="width" from="0" to="1100" dur="0.35s" begin="0.70s" fill="freeze"/></rect></clipPath>
</defs>
<g mask="url(#revealMask-dark)">
  <rect x="0" y="0" width="1180" height="610" rx="18" fill="url(#bgGlow-dark)"/>
  <rect x="4" y="4" width="1172" height="602" rx="16" fill="none" stroke="url(#borderGrad-dark)" stroke-width="2" filter="url(#softGlow-dark)"/>

  <text x="24" y="34" font-family="monospace" font-size="18" fill="#10B981">chandru@devos ~ %</text>
  <text x="24" y="34" font-family="monospace" font-size="18" fill="#64748B" text-anchor="end" x2="1156">
  </text>
  <text x="1156" y="34" font-family="monospace" font-size="16" fill="#64748B" text-anchor="end">SYSTEM.INFO</text>

  <g clip-path="url(#lc-dark-0)"><text x="40" y="60" font-family="monospace" font-size="18" fill="#E5E7EB"><tspan fill="#7DD3FC">Subject</tspan><tspan fill="#64748B">: ..................... </tspan></text></g>

  <rect x="40" y="546" width="1100" height="1" fill="#64748B" opacity="0.3"/>
  <text x="40" y="568" font-family="monospace" font-size="14" fill="#64748B">See live GitHub stats badges below in README ↓</text>

  <text x="24" y="590" font-family="monospace" font-size="16" fill="#10B981">
    chandru@devos ~ % ./profile.sh --live
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
</g>
</svg>